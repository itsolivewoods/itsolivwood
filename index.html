<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>

  <!-- Preview pour X -->
  <meta property="og:title" content="Just a second... 👀">
  <meta property="og:description" content="Preparing your content...">
  <meta property="og:image" content="https://raw.githubusercontent.com/fa4733763-maker/ni/main/preview.jpg">
  <meta property="og:url" content="https://bouncy.ai/itsolivewoods">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    body {
      margin: 0;
      background: #0f0f12;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 360px;
      text-align: center;
    }

    img {
      width: 100%;
      border-radius: 14px;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .loader {
      width: 100%;
      height: 6px;
      background: #222;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff2d75, #ff8a00);
      animation: load 1.3s ease forwards;
    }

    @keyframes load {
      from { width: 0%; }
      to { width: 100%; }
    }

    .text {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.75;
    }
  </style>

  <script>
    // Délai optimisé (1.3s)
    setTimeout(() => {
      window.location.href = "step2.html";
    }, 1300);
  </script>

</head>
<body>

  <div class="card">
    <img src="https://raw.githubusercontent.com/fa4733763-maker/ni/main/preview.jpg" alt="preview">

    <div class="loader">
      <div class="bar"></div>
    </div>

    <div class="text">Securing your connection...</div>
  </div>

</body>
</html>
